<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alamine Batumi Tours</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8CC7A;--dark:#0D0D0D;--dark2:#141414;--cream:#F5EDD6;--text:#E8E0D0;--muted:#888;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(180deg,#0D0D0D 0%,transparent 100%);padding:20px 20px 10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.header p{font-size:12px;color:var(--muted);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.screen{display:none}.screen.active{display:block}
.tours-container{padding:16px 16px 100px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;padding-left:4px}
.tour-card{background:var(--dark2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;border:1px solid #222;transition:transform 0.2s,border-color 0.2s;cursor:pointer}
.tour-card:active{transform:scale(0.98)}
.tour-card:hover{border-color:var(--gold)}
.tour-image-wrapper{position:relative}
.tour-image{width:100%;height:160px;object-fit:cover;display:block}
.tour-image-placeholder{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:48px;background:#1a1a2e;position:relative}
.tour-badge{position:absolute;top:12px;right:12px;background:var(--gold);color:var(--dark);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.5px}
.tour-info{padding:16px}
.tour-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--cream);margin-bottom:6px}
.tour-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.tour-meta{display:flex;gap:16px;margin-bottom:14px}
.tour-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.tour-footer{display:flex;align-items:center;justify-content:space-between}
.tour-price{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold)}
.tour-price span{font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);font-weight:400}
.book-btn{background:var(--gold);color:var(--dark);border:none;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s,transform 0.1s;font-family:'DM Sans',sans-serif;letter-spacing:0.3px}
.book-btn:active{transform:scale(0.96);background:var(--gold-light)}
.booking-screen{padding:0 0 100px}
.booking-hero{height:200px;display:flex;align-items:flex-end;padding:20px;position:relative;overflow:hidden}
.booking-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.5}
.booking-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,#0D0D0D,transparent)}
.booking-hero-content{position:relative;z-index:1}
.booking-tour-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--cream)}
.booking-tour-price{font-size:16px;color:var(--gold);margin-top:4px}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:20px 20px 0;font-family:'DM Sans',sans-serif}
.back-btn:active{color:var(--gold)}
.form-container{padding:20px}
.form-group{margin-bottom:18px}
.form-label{font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block}
.form-input{width:100%;background:var(--dark2);border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:#444}
.people-selector{display:flex;align-items:center;background:var(--dark2);border:1px solid #2a2a2a;border-radius:12px;overflow:hidden}
.people-btn{background:none;border:none;color:var(--gold);font-size:22px;width:52px;height:52px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.people-btn:active{background:#1a1a1a}
.people-count{flex:1;text-align:center;font-size:20px;font-family:'Cormorant Garamond',serif;color:var(--cream)}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;margin-top:8px;transition:opacity 0.2s,transform 0.1s}
.submit-btn:active{opacity:0.9;transform:scale(0.99)}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 24px;text-align:center}
.success-icon{width:80px;height:80px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px;animation:pop 0.4s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.success-title{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--cream);margin-bottom:12px}
.success-text{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px}
.success-detail{background:var(--dark2);border:1px solid #222;border-radius:var(--radius);padding:16px 20px;margin-top:24px;width:100%;max-width:320px;text-align:left}
.success-detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.success-detail-row:last-child{border-bottom:none}
.success-detail-row span:first-child{color:var(--muted)}
.success-detail-row span:last-child{color:var(--cream);font-weight:500}
</style>
</head>
<body>
<div class="header">
  <h1>Alamine Batumi</h1>
  <p>Tours & Experiences</p>
</div>

<div id="screen-tours" class="screen active">
  <div class="tours-container">
    <p class="section-title">Available Tours</p>
    <div id="tours-list"><div class="loading">Loading tours...</div></div>
  </div>
</div>

<div id="screen-booking" class="screen booking-screen">
  <button class="back-btn" onclick="showScreen('tours')">← Back to Tours</button>
  <div class="booking-hero">
    <div class="booking-hero-bg" id="booking-hero-bg"></div>
    <div class="booking-hero-overlay"></div>
    <div class="booking-hero-content">
      <div class="booking-tour-name" id="booking-tour-name">Tour</div>
      <div class="booking-tour-price" id="booking-tour-price">Price / person</div>
    </div>
  </div>
  <div class="form-container">
    <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="input-name" placeholder="Enter your name"/></div>
    <div class="form-group"><label class="form-label">Number of People</label><div class="people-selector"><button class="people-btn" onclick="changePeople(-1)">−</button><div class="people-count" id="people-count">1</div><button class="people-btn" onclick="changePeople(1)">+</button></div></div>
    <div class="form-group"><label class="form-label">Preferred Date</label><input type="date" class="form-input" id="input-date"/></div>
    <div class="form-group"><label class="form-label">Phone Number (optional)</label><input type="tel" class="form-input" id="input-phone" placeholder="+995 555 000 000"/></div>
    <button class="submit-btn" id="submit-btn" onclick="submitBooking()">Confirm Booking ✓</button>
  </div>
</div>

<div id="screen-success" class="screen">
  <div class="success-screen">
    <div class="success-icon">✓</div>
    <div class="success-title">Booking Received!</div>
    <div class="success-text">Your tour request has been sent. Our team will contact you shortly to confirm.</div>
    <div class="success-detail" id="success-detail"></div>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#0D0D0D');tg.setBackgroundColor('#0D0D0D')}

let selectedTour={};
let peopleCount=1;
const today=new Date().toISOString().split('T')[0];
document.getElementById('input-date').min=today;

const WEBHOOK_URL='https://n8n.srv1678654.hstgr.cloud/webhook/a80c982a-fe3b-41bf-8cf4-72c569076cdb';
const SHEET_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vTfW5r941vQNB9U7chAzYnysd2-3eMCGGYiQj157YMwz_mVP3ReWEfZaf_leAzUh7S0rKqWH1BHHaWj/pub?gid=0&single=true&output=csv';
const SHEET_URL='https://corsproxy.io/?'+encodeURIComponent(SHEET_CSV);

async function loadTours(){
  try{
    const res=await fetch(SHEET_URL);
    const csv=await res.text();
    const lines=csv.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.trim());
    const tours=lines.slice(1).map(line=>{
      const vals=line.split(',');
      const tour={};
      headers.forEach((h,i)=>tour[h]=vals[i]?.trim()||'');
      return tour;
    });
    renderTours(tours);
  }catch(e){
    document.getElementById('tours-list').innerHTML='<div class="loading">Failed to load tours. Please try again.</div>';
  }
}

function renderTours(tours){
  const list=document.getElementById('tours-list');
  list.innerHTML=tours.map(t=>`
    <div class="tour-card" onclick="selectTour(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="tour-image-wrapper">
        ${t.image?`<img class="tour-image" src="${t.image}" alt="${t.name}" onerror="this.style.display='none'">`:'<div class="tour-image-placeholder">🏙️</div>'}
        ${t.badge?`<div class="tour-badge">${t.badge}</div>`:''}
      </div>
      <div class="tour-info">
        <div class="tour-name">${t.name}</div>
        <div class="tour-desc">${t.description}</div>
        <div class="tour-meta">
          <div class="tour-meta-item"><span>⏱</span><span>${t.duration}</span></div>
          <div class="tour-meta-item"><span>👥</span><span>${t.group}</span></div>
        </div>
        <div class="tour-footer">
          <div class="tour-price">${t.price} <span>/ person</span></div>
          <button class="book-btn" onclick="event.stopPropagation();selectTour(${JSON.stringify(t).replace(/"/g,'&quot;')})">Book Now</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
}

function selectTour(t){
  if(typeof t==='string') t=JSON.parse(t.replace(/&quot;/g,'"'));
  selectedTour=t;
  document.getElementById('booking-tour-name').textContent=t.name;
  document.getElementById('booking-tour-price').textContent=t.price+' / person';
  document.getElementById('booking-hero-bg').style.backgroundImage=t.image?`url('${t.image}')`:'none';
  peopleCount=1;
  document.getElementById('people-count').textContent=1;
  showScreen('booking');
}

function changePeople(delta){
  peopleCount=Math.max(1,Math.min(20,peopleCount+delta));
  document.getElementById('people-count').textContent=peopleCount;
}

async function submitBooking(){
  const name=document.getElementById('input-name').value.trim();
  const date=document.getElementById('input-date').value;
  const phone=document.getElementById('input-phone').value.trim();
  if(!name){alert('Please enter your name');return}
  if(!date){alert('Please select a date');return}

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.textContent='Sending...';

  const bookingData={
    tour:selectedTour.name,
    price:selectedTour.price,
    name,
    people:peopleCount,
    date,
    phone:phone||'Not provided'
  };

  try ( await fetch(WEBHOOK_URL,{
  method:'POST',
  mode:'no-cors',
  headers:{'Content-Type':'text/plain'},
  body:JSON.stringify(bookingData)
});
  }catch(e){
    console.log('Webhook error:',e);
  }

  const priceNum=parseFloat(selectedTour.price.replace(/[^0-9.]/g,''));
  document.getElementById('success-detail').innerHTML=`
    <div class="success-detail-row"><span>Tour</span><span>${selectedTour.name}</span></div>
    <div class="success-detail-row"><span>Name</span><span>${name}</span></div>
    <div class="success-detail-row"><span>People</span><span>${peopleCount} person${peopleCount>1?'s':''}</span></div>
    <div class="success-detail-row"><span>Date</span><span>${new Date(date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</span></div>
    <div class="success-detail-row"><span>Total</span><span>${(priceNum*peopleCount).toFixed(0)} GEL</span></div>
  `;
  showScreen('success');
}

loadTours();
</script>
</body>
</html>
