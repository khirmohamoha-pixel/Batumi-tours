<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>علمين باتومي — الجولات</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8CC7A;--dark:#0D0D0D;--dark2:#141414;--cream:#F5EDD6;--text:#E8E0D0;--muted:#888;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;direction:rtl}
.header{padding:20px 20px 12px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;z-index:100;background:var(--dark);backdrop-filter:blur(10px)}
.header-top{display:flex;align-items:center;gap:12px}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0;line-height:1;display:none}
.back-btn.visible{display:block}
.header-info{flex:1}
.header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold)}
.header p{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:1px}
.step-indicator{display:flex;gap:6px;margin-top:12px}
.step-dot{height:3px;border-radius:2px;flex:1;background:#2a2a2a;transition:background 0.3s}
.step-dot.active{background:var(--gold)}
.step-dot.done{background:rgba(201,168,76,0.4)}
.screen{display:none;padding:20px 20px 100px;animation:fadeIn 0.3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.loading{text-align:center;padding:80px 20px}
.loader{width:44px;height:44px;border:3px solid #2a2a2a;border-top:3px solid var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted);letter-spacing:1px}
.loading-sub{font-size:11px;color:#444;margin-top:6px}
.tour-grid{display:flex;flex-direction:column;gap:14px}
.tour-card{border-radius:var(--radius);overflow:hidden;border:1px solid #222;cursor:pointer;transition:all 0.2s;background:var(--dark2)}
.tour-card:active{transform:scale(0.98)}
.tour-card:hover{border-color:var(--gold)}
.tour-img{width:100%;height:180px;object-fit:cover;display:block}
.tour-img-placeholder{width:100%;height:180px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:48px}
.tour-info{padding:14px}
.tour-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--cream);margin-bottom:6px}
.tour-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.tour-meta{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.tour-footer{display:flex;align-items:center;justify-content:space-between}
.tour-price{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold)}
.tour-price span{font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);font-weight:400}
.book-btn{background:var(--gold);color:var(--dark);border:none;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.book-btn:active{background:var(--gold-light)}
.booking-hero{height:200px;display:flex;align-items:flex-end;padding:20px;position:relative;overflow:hidden;border-radius:var(--radius);margin-bottom:20px}
.booking-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.5}
.booking-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,#0D0D0D,transparent)}
.booking-hero-content{position:relative;z-index:1}
.booking-tour-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--cream)}
.booking-tour-price{font-size:16px;color:var(--gold);margin-top:4px}
.form-group{margin-bottom:18px}
.form-label{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}
.form-input{width:100%;background:var(--dark2);border:1px solid #2a2a2a;border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;-webkit-appearance:none;text-align:right}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:#444}
.form-input.error{border-color:#e57373}
.people-selector{display:flex;align-items:center;background:var(--dark2);border:1px solid #2a2a2a;border-radius:12px;overflow:hidden}
.people-btn{background:none;border:none;color:var(--gold);font-size:22px;width:52px;height:52px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.people-btn:active{background:#1a1a1a}
.people-count{flex:1;text-align:center;font-size:20px;font-family:'Cormorant Garamond',serif;color:var(--cream)}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:opacity 0.2s}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed}
.error-msg{font-size:11px;color:#e57373;margin-top:4px;display:none}
.error-msg.visible{display:block}
.success-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 0 100px}
.success-icon{width:80px;height:80px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px;animation:pop 0.4s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.success-title{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--cream);margin-bottom:12px}
.success-text{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px}
.success-detail{background:var(--dark2);border:1px solid #222;border-radius:var(--radius);padding:16px 20px;margin-top:24px;width:100%;text-align:right}
.success-detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.success-detail-row:last-child{border-bottom:none}
.success-detail-row span:first-child{color:var(--muted)}
.success-detail-row span:last-child{color:var(--cream);font-weight:500}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <button class="back-btn" id="backBtn" onclick="goBack()">→</button>
    <div class="header-info">
      <h1 id="headerTitle">Alamine Batumi</h1>
      <p id="headerSub">الجولات والرحلات</p>
    </div>
  </div>
  <div class="step-indicator">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>
</div>

<div class="screen active" id="screen-tours">
  <p class="section-title">الجولات المتاحة</p>
  <div class="tour-grid" id="tours-list">
    <div class="loading">
      <div class="loader"></div>
      <div class="loading-text">جار تحميل الجولات</div>
      <div class="loading-sub">يرجى الانتظار...</div>
    </div>
  </div>
</div>

<div class="screen" id="screen-booking">
  <div class="booking-hero">
    <div class="booking-hero-bg" id="booking-hero-bg"></div>
    <div class="booking-hero-overlay"></div>
    <div class="booking-hero-content">
      <div class="booking-tour-name" id="booking-tour-name">الجولة</div>
      <div class="booking-tour-price" id="booking-tour-price"></div>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">الاسم الكامل</label>
    <input type="text" class="form-input" id="input-name" placeholder="أدخل اسمك الكامل" autocomplete="name">
    <div class="error-msg" id="nameError">يرجى إدخال اسمك</div>
  </div>
  <div class="form-group">
    <label class="form-label">عدد الأشخاص</label>
    <div class="people-selector">
      <button class="people-btn" onclick="changePeople(-1)">−</button>
      <div class="people-count" id="people-count">1</div>
      <button class="people-btn" onclick="changePeople(1)">+</button>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">التاريخ المفضل</label>
    <input type="date" class="form-input" id="input-date">
    <div class="error-msg" id="dateError">يرجى اختيار التاريخ</div>
  </div>
  <div class="form-group">
    <label class="form-label">رقم الهاتف</label>
    <input type="tel" class="form-input" id="input-phone" placeholder="+995 555 000 000" autocomplete="tel">
    <div class="error-msg" id="phoneError">يرجى إدخال رقم هاتفك</div>
  </div>
  <button class="submit-btn" id="submit-btn" onclick="submitBooking()">تأكيد الحجز ✓</button>
</div>

<div class="screen" id="screen-success">
  <div class="success-screen">
    <div class="success-icon">✓</div>
    <div class="success-title">تم استلام الحجز</div>
    <div class="success-text">شكراً لك! سيتواصل معك فريقنا قريباً لتأكيد حجزك.</div>
    <div class="success-detail" id="success-detail"></div>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#0D0D0D');tg.setBackgroundColor('#0D0D0D')}
const WEBHOOK_URL='https://n8n.srv1678654.hstgr.cloud/webhook/a80c982a-fe3b-41bf-8cf4-72c569076cdb';
const SHEET_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vTxEXEDiRFweNmNvG9SQga6Sj4AV5j4Ov9tMbT63EBG2__pZh12wheOa-Igl3v76WX1xTcLxDYui5lX/pub?gid=0&single=true&output=csv';
const SHEET_URL='https://corsproxy.io/?'+encodeURIComponent(SHEET_CSV);
let selectedTour={};
let peopleCount=1;
let currentScreen='tours';
let screenHistory=[];
const today=new Date().toISOString().split('T')[0];
document.getElementById('input-date').min=today;

async function loadTours(){
  try{
    const res=await fetch(SHEET_URL);
    const csv=await res.text();
    const lines=csv.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.trim());
    const tours=lines.slice(1).map(line=>{
      const vals=line.split(',');
      const tour={};
      headers.forEach((h,i)=>tour[h]=vals[i]?.trim()||'');
      return tour;
    });
    renderTours(tours);
  }catch(e){
    document.getElementById('tours-list').innerHTML='<div class="loading"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div class="loading-text">فشل التحميل</div><div class="loading-sub">يرجى الإغلاق والمحاولة مجدداً</div></div>';
  }
}

function renderTours(tours){
  const list=document.getElementById('tours-list');
  list.innerHTML=tours.map(t=>`
    <div class="tour-card" onclick="selectTour(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="tour-img-placeholder">🏙️</div>
      ${t.image?`<img class="tour-img" src="${t.image}" alt="${t.name}" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">` :''}
      <div class="tour-info">
        <div class="tour-name">${t.name}</div>
        <div class="tour-desc">${t.description}</div>
        <div class="tour-meta">
          ${t.duration?`<div class="meta-item"><span>⏱</span><span>${t.duration}</span></div>`:''}
          ${t.group?`<div class="meta-item"><span>👥</span><span>${t.group}</span></div>`:''}
        </div>
        <div class="tour-footer">
          <div class="tour-price">${t.price} <span>/ شخص</span></div>
          <button class="book-btn" onclick="event.stopPropagation();selectTour(${JSON.stringify(t).replace(/"/g,'&quot;')})">احجز الآن</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showScreen(name){
  screenHistory.push(currentScreen);
  currentScreen=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
  updateDots();
  document.getElementById('backBtn').classList.toggle('visible',name!=='tours');
}

function goBack(){
  if(screenHistory.length===0) return;
  currentScreen=screenHistory.pop();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+currentScreen).classList.add('active');
  window.scrollTo(0,0);
  updateDots();
  document.getElementById('backBtn').classList.toggle('visible',currentScreen!=='tours');
}

function updateDots(){
  const map={tours:0,booking:1,success:2};
  const step=map[currentScreen]||0;
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active',i===step);
    d.classList.toggle('done',i<step);
  });
}

function selectTour(t){
  if(typeof t==='string') t=JSON.parse(t.replace(/&quot;/g,'"'));
  selectedTour=t;
  document.getElementById('booking-tour-name').textContent=t.name;
  document.getElementById('booking-tour-price').textContent=t.price+' / شخص';
  document.getElementById('booking-hero-bg').style.backgroundImage=t.image?`url('${t.image}')`:'none';
  peopleCount=1;
  document.getElementById('people-count').textContent=1;
  document.getElementById('input-name').value='';
  document.getElementById('input-date').value='';
  document.getElementById('input-phone').value='';
  document.querySelectorAll('.error-msg').forEach(e=>e.classList.remove('visible'));
  document.querySelectorAll('.form-input').forEach(e=>e.classList.remove('error'));
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('submit-btn').textContent='تأكيد الحجز ✓';
  showScreen('booking');
}

function changePeople(delta){
  peopleCount=Math.max(1,Math.min(20,peopleCount+delta));
  document.getElementById('people-count').textContent=peopleCount;
}

async function submitBooking(){
  let valid=true;
  const name=document.getElementById('input-name').value.trim();
  const date=document.getElementById('input-date').value;
  const phone=document.getElementById('input-phone').value.trim();
  if(!name){document.getElementById('nameError').classList.add('visible');document.getElementById('input-name').classList.add('error');valid=false;}
  else{document.getElementById('nameError').classList.remove('visible');document.getElementById('input-name').classList.remove('error');}
  if(!date){document.getElementById('dateError').classList.add('visible');document.getElementById('input-date').classList.add('error');valid=false;}
  else{document.getElementById('dateError').classList.remove('visible');document.getElementById('input-date').classList.remove('error');}
  if(!phone){document.getElementById('phoneError').classList.add('visible');document.getElementById('input-phone').classList.add('error');valid=false;}
  else{document.getElementById('phoneError').classList.remove('visible');document.getElementById('input-phone').classList.remove('error');}
  if(!valid) return;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.textContent='جار الإرسال...';
  const bookingData={type:'tour',lang:'ar',tour:selectedTour.name,price:selectedTour.price,name,people:peopleCount,date,phone};
  try{
    await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bookingData)});
  }catch(e){console.log('Webhook error:',e);}
  const d=new Date(date);
  document.getElementById('success-detail').innerHTML=`
    <div class="success-detail-row"><span>الجولة</span><span>${selectedTour.name}</span></div>
    <div class="success-detail-row"><span>الاسم</span><span>${name}</span></div>
    <div class="success-detail-row"><span>عدد الأشخاص</span><span>${peopleCount} ${peopleCount>1?'أشخاص':'شخص'}</span></div>
    <div class="success-detail-row"><span>التاريخ</span><span>${d.toLocaleDateString('ar-SA',{day:'numeric',month:'long',year:'numeric'})}</span></div>
    <div class="success-detail-row"><span>الهاتف</span><span>${phone}</span></div>
  `;
  showScreen('success');
  document.getElementById('backBtn').classList.remove('visible');
}

loadTours();
</script>
</body>
</html>
